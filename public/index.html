<!doctype html>


<html>

<head>
    <title>Waves</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <meta charset="utf-8">
    <script type="module" src="index.js"></script>
    <link rel="stylesheet" href="index.css">
</head>

<body>
    <!-- frontend app -->
    <div id="app" autoplay>
        <!-- auth-container -->
            <div class="auth-container">
                <div class="tabs">
                    <button class="tab-btn active" id="loginTab">Login</button>
                    <button class="tab-btn" id="signupTab">Signup</button>
                </div>
                <!-- login -->
                <form id="loginForm" class="active">
                    <!-- login with username -->
                    <input type="text" placeholder="Username" />
                    <input type="password" placeholder="Password" />
                    <button type="submit" class="submit-btn">
                        Login
                    </button>
                    <div class="divider">OR</div>
                    <button type="button" id="googleLoginBtn" class="google-btn">
                        Continue with Google
                    </button>
                </form>
                <!-- signup -->
                <form id="signupForm">
                    <input type="text" id="username" placeholder="Username *" />
                    <input type="text" id="firstName" placeholder="First Name" />
                    <input type="text" id="lastName" placeholder="Last Name" />
                    <input type="email" id="email" placeholder="Email ID" />
                    <input type="password" id="password" placeholder="Password *" />
                    <input type="url" id="avatarURL" placeholder="Avatar URL" />
                    <button type="submit" class="submit-btn">
                        Create Account
                    </button>
                    <div class="divider">OR</div>
                    <button type="button" id="googleLoginBtn" class="google-btn">
                        Signup with Google
                    </button>
                </form>
            </div>
            <p id="welcome-text" style="display:none;"></p>
            <ul id="user-list"></ul>

        <div id="call-wrapper">
            <!-- // video container  -->
            <div id="camerabox">

                <!-- // chat container  -->
                <div id="chat-container">
                    <div id="chat-header">
                        <div id="chat-user">Chat</div>
                    </div>
                    <div id="messages"></div>
                    <div class="chat-input-container">
                        <input id="chat-input" disabled type="text" placeholder="Type message..." />
                        <button id="send-btn" type="button" disabled aria-label="Send message">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="white">
                            <path d="M2 21l21-9L2 3v7l15 2-15 2z" />
                        </svg>

                        </button>
                    </div>
                </div>


                <video id="received_video" autoplay></video>
                <span id="remote-name-label" class="video-label"></span>
                <video id="local_video" autoplay muted></video>
                <span id="local-name-label" class="video-label local-label"></span>
                <div class="controls">

                    <button id="micBtn" type="button" aria-label="Mute microphone">
                        <img src="mic.png" alt="" />
                        <span class="tooltip">Mute</span>
                    </button>
                    <button id="videoBtn" type="button" aria-label="Turn camera off">
                        <img src="cam_video.png" alt="" />
                        <span class="tooltip">Stop Video</span>
                    </button>
                    <button id="shareBtn" style="display:none;" type="button" aria-label="Start Sharing Screen">
                        <img src="share.webp" alt="" />
                        <span class="tooltip">Start Sharing</span>
                    </button>

                    <button id="recordBtn" type="button" style="display:none;" aria-label="Recording Call">
                        <img src="rec.png" alt="">
                        <span class="tooltip">Start Recording</span>
                    </button>
                    <button id="chatToggleBtn" type="button" aria-label="Toggle Chat">
                        <img src="chatt.png" alt="">
                        <span class="tooltip">Chat</span>
                    </button>

                    <button id="HangupBtn" class="active" style="display:none;" type="button" aria-label="Hang Up">
                        <img src="call.png" alt="" />
                        <span class="tooltip">Hang Up</span>
                    </button>
                   

                </div>
            </div>
        </div>

        <!-- record stream -->
        <div class="popup" id="recordingPopup" style="display:none;">
            <h3 class="popup-title">Recording Complete</h3>

            <p class="popup-meta">
                Duration: <b id="duration"></b>
                &nbsp;·&nbsp;
                Size: <b id="size"></b>
            </p>

            <div class="popup-actions">
                <a id="popupDownload" class="btn download" download="screen-recording.webm">
                    ⬇️ Download
                </a>

                <button id="popupClose" class="btn discard">
                    ❌ Discard
                </button>
            </div>
        </div>

        <div id="recordingBackdrop" class="backdrop" style="display:none;"></div>


    </div>
</body>

</html>
