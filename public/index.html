<!doctype html>

<html>
  <head>
    <title>Waves</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon" />
    <meta charset="utf-8" />
    <script type="module" src="index.js"></script>
    <link rel="stylesheet" href="index.css" />
  </head>

  <body>
    <!-- frontend app -->
    <div id="app" autoplay>
      <!-- auth-container -->
      <div class="auth-container">
        <div class="tabs">
          <button class="tab-btn active" id="loginTab">Login</button>
          <button class="tab-btn" id="signupTab">Signup</button>
        </div>
        <!-- login -->
        <form id="loginForm" class="active">
          <!-- login with username -->
          <input type="text" id="login-username" placeholder="Username" />
          <input type="password" id="login-password" placeholder="Password" />
          <button type="submit" class="submit-btn">Login</button>
          <div class="divider">OR</div>
          <button type="button" class="google-btn">Continue with Google</button>
        </form>
        <!-- signup -->
        <form id="signupForm">
          <input type="text" id="signup-username" placeholder="Username *" />
          <input type="text" id="firstName" placeholder="First Name" />
          <input type="text" id="lastName" placeholder="Last Name" />
          <input type="email" id="email" placeholder="Email ID *" />
          <input type="password" id="signup-password" placeholder="Password *" />
          <input type="url" id="avatarURL" placeholder="Avatar URL" />
          <button type="submit" class="submit-btn">Create Account</button>
          <div class="divider">OR</div>
          <button type="button" class="google-btn">Signup with Google</button>
        </form>
      </div>
    </div>
  </body>
</html>
