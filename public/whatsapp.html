<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Waves</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #e5ddd5;
            overflow: hidden;
        }

        /* =========================
       LOADING SCREEN
    ========================== */

        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: #f0f2f5;

            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;

            z-index: 9999;
        }

        .loader-logo {
            font-size: 42px;
            color: #25D366;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .loading-bar {
            width: 220px;
            height: 4px;
            background: #ddd;
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 15px;
        }

        .loading {
            width: 0%;
            height: 100%;
            background: #25D366;
            animation: load 1s linear forwards;
        }

        @keyframes load {
            from {
                width: 0%;
            }

            to {
                width: 100%;
            }
        }

        .loader-text {
            color: gray;
            font-size: 14px;
        }

        /* =========================
       MAIN APP
    ========================== */

        #app {
            display: none;
            height: 100vh;
            width: 100%;
        }

        .app {
            display: flex;
            height: 100%;
        }

        /* LEFT SIDE */

        .sidebar {
            width: 380px;
            background: #fff;
            border-right: 1px solid #ddd;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 15px;
            font-size: 28px;
            font-weight: bold;
            color: #25D366;
            border-bottom: 1px solid #eee;
        }

        .search-box {
            padding: 12px;
        }

        .search-box input {
            width: 100%;
            padding: 12px 15px;
            border: none;
            border-radius: 25px;
            background: #f0f2f5;
            outline: none;
            font-size: 15px;
        }

        .chat-list {
            flex: 1;
            overflow-y: auto;
        }

        .chat-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 15px;
            cursor: pointer;
            border-bottom: 1px solid #f5f5f5;
            transition: 0.2s;
        }

        .chat-item:hover {
            background: #f5f5f5;
        }

        .avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            object-fit: cover;
        }

        .chat-info {
            flex: 1;
        }

        .top-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
        }

        .name {
            font-size: 17px;
            font-weight: 600;
        }

        .time {
            font-size: 12px;
            color: gray;
        }

        .message {
            font-size: 14px;
            color: #666;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 220px;
        }

        /* RIGHT SIDE */

        .chat-window {
            flex: 1;
            background: #efeae2;
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            height: 70px;
            background: #f0f2f5;
            display: flex;
            align-items: center;
            padding: 0 20px;
            border-bottom: 1px solid #ddd;
        }

        .chat-header img {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            margin-right: 12px;
        }

        .chat-header h3 {
            font-size: 18px;
        }

        .messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .msg {
            max-width: 300px;
            padding: 10px 14px;
            border-radius: 10px;
            font-size: 14px;
            line-height: 1.4;
        }

        .received {
            background: #fff;
            align-self: flex-start;
        }

        .sent {
            background: #d9fdd3;
            align-self: flex-end;
        }

        .chat-input {
            padding: 15px;
            background: #f0f2f5;
            display: flex;
            gap: 10px;
        }

        .chat-input input {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 25px;
            outline: none;
        }

        .chat-input button {
            padding: 12px 20px;
            border: none;
            border-radius: 25px;
            background: #25D366;
            color: white;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <!-- =========================
       LOADER
  ========================== -->

    <div id="loader">

        <div class="loader-logo">
            Waves
        </div>

        <div class="loading-bar">
            <div class="loading"></div>
        </div>

        <div class="loader-text">
            End-to-end encrypted
        </div>

    </div>

    <!-- =========================
       MAIN APP
  ========================== -->

    <div id="app">

        <div class="app">

            <!-- LEFT SIDE -->

            <div class="sidebar">

                <div class="sidebar-header">
                    Waves
                </div>

                <div class="search-box">

                    <input type="text" placeholder="Search or start new chat" id="searchInput" onkeyup="searchChat()" />

                </div>

                <div class="chat-list">

                    <div class="chat-item">
                        <img class="avatar" src="https://i.pravatar.cc/150?img=1">

                        <div class="chat-info">

                            <div class="top-row">
                                <div class="name">Aftab Bhai</div>
                                <div class="time">10:24</div>
                            </div>

                            <div class="message">
                                Where are you?
                            </div>

                        </div>
                    </div>

                    <div class="chat-item">
                        <img class="avatar" src="https://i.pravatar.cc/150?img=2">

                        <div class="chat-info">

                            <div class="top-row">
                                <div class="name">Ammi</div>
                                <div class="time">Yesterday</div>
                            </div>

                            <div class="message">
                                Call me when free
                            </div>

                        </div>
                    </div>

                    <div class="chat-item">
                        <img class="avatar" src="https://i.pravatar.cc/150?img=3">

                        <div class="chat-info">

                            <div class="top-row">
                                <div class="name">Qadir Bhai</div>
                                <div class="time">09:10</div>
                            </div>

                            <div class="message">
                                Let's meet tomorrow
                            </div>

                        </div>
                    </div>

                </div>

            </div>

            <!-- RIGHT SIDE -->

            <div class="chat-window">

                <div class="chat-header">

                    <img src="https://i.pravatar.cc/150?img=1">

                    <h3>Aftab Bhai</h3>

                </div> 

                <div class="messages">

                    <div class="msg received">
                        Hello 👋
                    </div>

                    <div class="msg sent">
                        Hi bhai
                    </div>

                    <div class="msg received">
                        Are you coming today?
                    </div>

                    <div class="msg sent">
                        Yes, in 10 mins
                    </div>

                </div> 

                <div class="chat-input">

                    <input type="text" placeholder="Type a message" />

                    <button>
                        Send
                    </button>

                </div>

             </div>

        </div>

    </div>

    <script>

        /* =========================
           LOADER
        ========================== */

        window.onload = function () {

            setTimeout(() => {

                document.getElementById("loader").style.display = "none";

                document.getElementById("app").style.display = "block";

            }, 1000);

        };

        /* =========================
           SEARCH CHAT
        ========================== */

        function searchChat() {

            const input = document
                .getElementById("searchInput")
                .value
                .toLowerCase();

            const chats = document.querySelectorAll(".chat-item");

            chats.forEach(chat => {

                const name = chat
                    .querySelector(".name")
                    .innerText
                    .toLowerCase();

                if (name.includes(input)) {
                    chat.style.display = "flex";
                } else {
                    chat.style.display = "none";
                }

            });

        }

    </script>

</body>

</html>
